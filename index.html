<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julia Hoos | Das Coco Collective</title>
    <style>
        /* Elegantes Design in warmem Beige und hellem Rosa */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            background-color: #f5ebe0; /* Warmes Beige für den Hintergrund */
            padding: 40px 20px; 
            color: #4a3f35; /* Dunkles Braun/Grau für weichen Textkontrast */
            margin: 0;
        }
        .card { 
            background: #ffffff; 
            max-width: 420px; 
            margin: 0 auto; 
            padding: 40px 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(74, 63, 53, 0.05); 
        }
        h1 { 
            margin: 0 0 5px 0; 
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .subtitle { 
            margin: 0 0 35px 0; 
            font-size: 0.95rem; 
            color: #8a7a6e;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .contact-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f7d6d0; /* Helles Rosa für die Buttons */
            color: #4a3f35;
            text-decoration: none;
            padding: 16px;
            margin: 14px 0;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s ease-in-out;
        }
        .contact-btn:hover {
            background-color: #f2c4bc; /* Etwas dunkleres Rosa beim Drüberfahren */
            transform: translateY(-2px);
        }
        .emoji {
            margin-right: 12px;
            font-size: 1.2rem;
        }
        .footer {
            margin-top: 35px;
            font-size: 0.85rem;
            color: #b5a89e;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Julia Hoos</h1>
        <div class="subtitle">The Coco Collective</div> 
        
        <!-- E-Mail-Button -->
        <a href="mailto:join@thecococollective.de" class="contact-btn">
            <span class="emoji">📧</span> E-Mail schreiben
        </a>

        <!-- Telefon-Button -->
        <a href="tel:015254160104" class="contact-btn">
            <span class="emoji">📞</span> Anrufen
        </a>

        <!-- Instagram-Button -->
        <a href="https://www.instagram.com/the.coco.collective.de?igsh=MTBhY3h1azRmemJmaQ==" target="_blank" class="contact-btn">
            <span class="emoji">📸</span> Instagram
        </a>

        <div class="footer">
            © Julia Hoos
        </div>
    </div>

</body>
</html>
